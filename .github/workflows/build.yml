  name: Build                                                                                                                                                                       
                                                                                                                                                                                    
  on:                                                                                                                                                                             
    push:
      branches: [main]
    pull_request:
      branches: [main]
    release:                                                                                                                                                                        
      types: [published]

  permissions:                                                                                                                                                                                                               
    contents: write  
    
  jobs:                                                                                                                                                                           
    build:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v6
                                                                                                                                                                                    
        - uses: actions/setup-node@v6
          with:                                                                                                                                                                     
            node-version: '20'                                                                                                                                                    
            cache: 'npm'

        - name: Install dependencies
          run: npm ci
                                                                                                                                                                                    
        - name: Build
          run: npm run build                                                                                                                                                        
                                                                                                                                                                                  
        - name: Upload artifact
          uses: actions/upload-artifact@v7
          with:
            name: config-wrapper-card-${{ github.sha }}
            path: dist/config-wrapper-card.js                                                                                                                                       
            retention-days: 14
                                                                                                                                                                                    
        - name: Attach to release                                                                                                                                                 
          if: github.event_name == 'release'                                                                                                                                        
          uses: softprops/action-gh-release@v2                                                                                                                                    
          with:                                                                                                                                                                     
            files: dist/config-wrapper-card.js
