<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" role="img" aria-label="config-wrapper-card architecture">
  <style>
    .box { fill: #1e2129; stroke: #2c5c8c; stroke-width: 1.5; }
    .box-accent { fill: #2c5c8c; stroke: #2c5c8c; stroke-width: 1.5; }
    .title { font: bold 14px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #e8e8e8; }
    .sub { font: 11px "SFMono-Regular", Menlo, monospace; fill: #b8b8b8; }
    .sub-accent { font: 11px "SFMono-Regular", Menlo, monospace; fill: #e8e8e8; }
    .arrow { stroke: #7a8799; stroke-width: 1.5; fill: none; }
    .label { font: italic 11px -apple-system, "Segoe UI", Roboto, sans-serif; fill: #7a8799; }
    .bg { fill: #0d1117; }
  </style>
  <rect class="bg" width="760" height="300"/>

  <!-- Dashboard YAML -->
  <rect class="box" x="20" y="40" width="200" height="100" rx="6"/>
  <text class="title" x="120" y="65" text-anchor="middle">Dashboard YAML</text>
  <text class="sub" x="35" y="90">type: custom:config-</text>
  <text class="sub" x="35" y="104">  wrapper-card</text>
  <text class="sub" x="35" y="120">config_url: /local/...</text>

  <!-- Wrapper -->
  <rect class="box-accent" x="280" y="40" width="200" height="100" rx="6"/>
  <text class="title" x="380" y="65" text-anchor="middle">config-wrapper-card</text>
  <text class="sub-accent" x="295" y="90">fetchWithAuth(url)</text>
  <text class="sub-accent" x="295" y="106">yaml.load(text)</text>
  <text class="sub-accent" x="295" y="122">merge(inline, loaded)</text>

  <!-- External YAML file -->
  <rect class="box" x="280" y="180" width="200" height="80" rx="6"/>
  <text class="title" x="380" y="205" text-anchor="middle">External YAML file</text>
  <text class="sub" x="295" y="228">generated by any tool,</text>
  <text class="sub" x="295" y="244">integration or script</text>

  <!-- Inner card -->
  <rect class="box" x="540" y="40" width="200" height="100" rx="6"/>
  <text class="title" x="640" y="65" text-anchor="middle">Inner card</text>
  <text class="sub" x="555" y="90">custom:sankey-chart</text>
  <text class="sub" x="555" y="106">entities, markdown,</text>
  <text class="sub" x="555" y="122">stack, anything…</text>

  <!-- Arrows -->
  <line class="arrow" x1="220" y1="90" x2="275" y2="90" marker-end="url(#ah)"/>
  <line class="arrow" x1="480" y1="90" x2="535" y2="90" marker-end="url(#ah)"/>
  <line class="arrow" x1="380" y1="175" x2="380" y2="145" marker-end="url(#ah)"/>

  <text class="label" x="247" y="82" text-anchor="middle">setConfig</text>
  <text class="label" x="507" y="82" text-anchor="middle">render</text>
  <text class="label" x="395" y="163">fetch</text>

  <defs>
    <marker id="ah" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#7a8799"/>
    </marker>
  </defs>
</svg>
